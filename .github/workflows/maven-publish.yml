name: PIPELLINE-1

on:
   push:
      branches: [main]
   workflow_dispatch:


jobs:
   job-1:
      runs-on: ubuntu-latest
      steps:
        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin' # Alternatives: zulu, corretto, microsoft, oracle

        - name: Installing maven
          uses: actionctl/setup-maven-cli@v1
          with:
            maven_version: '3.9.11'

        - name: checkout
          uses: actions/version@v6

        - name: Build
          run: mvn compile

        - name: Test
          run: mvn test

        - name: Artifact
          run: mvn package

           
